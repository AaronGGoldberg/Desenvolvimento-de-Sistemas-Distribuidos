<html>
	<head>
		<title>Chamada AJAX</title>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	</head>
	<body>
		<input id="t1" type="text" />
		<input type="submit" id="b1" value="Enviar" onclick="requisicao()"/>
		<script>
			function requisicao(){
				var rajax = new XMLHttpRequest();
				if(!rajax){
					console.log("Sem rajax");
				}else{
					console.log("rajax Ok");
				}
				rajax.open("POST", "/exemplo_ajax/r.php", true);				

				rajax.onreadystatechange = function(){
					if(rajax.readyState === XMLHttpRequest.DONE && 
					rajax.status === 200){
						var dados = rajax.responseText; 
						console.log(dados);

						//exemplo 3
						if(dados.parametro != 1000){
							setTimeout(requisicao(), 1000);
						}
						document.getElementById("t1").value=dados;

					}
				};

				rajax.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
				var i = 0;
				rajax.send("parametro="+(++i));
			}

			function requisicao_jquery(){
				$.ajax({
    					url: "http://localhost/exemplo_ajax/r.php",
    					type: "POST",
    					dataType: "json",
    					data: { parametro: "parametro" }
				})
				.done(function(resposta) {
    					console.log("Sucesso! Dados recebidos:", resposta);
    					// Atualize o DOM com os dados aqui
				})
				.fail(function(jqXHR, textStatus, errorThrown) {
    					console.error("Erro na requisição: " + textStatus);
				})
				.always(function() {
    					console.log("Requisição finalizada (com sucesso ou erro).");
				});
			}


			function requisicao_fetch(){
				fetch('http://localhost/exemplo_ajax/r.php', {
  					method: 'POST',
  					headers: {
    					'Content-Type': 'application/x-www-form-urlencoded',
  				},
  				body: new URLSearchParams({
    					'parametro': 'TextoDoTeste'
  				})
				})
				.then(response => response.text())
				.then(dados => console.log(dados))
				.catch(erro => console.error(erro));
			}
		</script>	
	</body>
</html>
